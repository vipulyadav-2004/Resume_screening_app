<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Resume Screener</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container py-5">
        <h2 class="text-center mb-4">📄 AI Resume Screening & Ranking Engine</h2>
        
        <form action="/score" method="POST" enctype="multipart/form-data" class="bg-white p-4 rounded shadow-sm">
            <div class="mb-3">
                <label class="form-label fw-bold">1. Paste Job Description</label>
                <textarea class="form-control" name="job_description" rows="6" placeholder="Paste requirements here..." required></textarea>
            </div>
            
            <div class="mb-4">
                <label class="form-label fw-bold">2. Upload Resumes (TXT files for testing)</label>
                <input class="form-control" type="file" name="resumes" multiple required>
            </div>
            
            <button type="submit" class="btn btn-primary w-100 fw-bold">Analyze & Rank Candidates</button>
        </form>

        <!-- {% if results %} -->
        <div class="mt-5">
            <h3 class="mb-3">📊 Screening Leaderboard Results</h3>
            <table class="table table-striped table-hover bg-white rounded shadow-sm overflow-hidden">
                <thead class="table-dark">
                    <tr>
                        <th>Rank</th>
                        <th>Candidate/File Name</th>
                        <th>Semantic Match Score</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- {% for res in results %} -->
                    <tr>
                        <td><strong>#{{ loop.index }}</strong></td>
                        <td>{{ res.filename }}</td>
                        <td>
                            <div class="progress" style="height: 20px;">
                                <div class="progress-bar bg-success" role="progressbar" style="width: {{ res.score }}{{ '%' }};" aria-valuenow="{{ res.score }}" aria-valuemin="0" aria-valuemax="100">{{ res.score }}{{ '%' }}</div>
                            </div>
                        </td>
                    </tr>
                    <!-- {% endfor %} -->
                </tbody>
            </table>
        </div>
        <!-- {% endif %} -->
    </div>
</body>
</html>
